version: '3.9'

networks:
  clo835-net:
    driver: bridge

services:
  mysql:
    image: r3x0n05/mysql:v1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: pw
    networks:
      - clo835-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppw"]
      interval: 10s
      timeout: 5s
      retries: 5

  blue:
    image: r3x0n05/webapp:v1
    container_name: blue
    ports:
      - "8081:8080"
    environment:
      APP_COLOR: blue
      DBHOST: mysql
      DBPORT: 3306
      DBUSER: root
      DBPWD: pw
      DATABASE: employees
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clo835-net

  pink:
    image: r3x0n05/webapp:v1
    container_name: pink
    ports:
      - "8082:8080"
    environment:
      APP_COLOR: pink
      DBHOST: mysql
      DBPORT: 3306
      DBUSER: root
      DBPWD: pw
      DATABASE: employees
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clo835-net

  lime:
    image: r3x0n05/webapp:v1
    container_name: lime
    ports:
      - "8083:8080"
    environment:
      APP_COLOR: lime
      DBHOST: mysql
      DBPORT: 3306
      DBUSER: root
      DBPWD: pw
      DATABASE: employees
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - clo835-net